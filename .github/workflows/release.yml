name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Create zip
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          git archive -o minimax-image-${VERSION}.zip --prefix=minimax-image/ HEAD

      - name: Create tar.gz
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          git archive --format=tar.gz -o minimax-image-${VERSION}.tar.gz HEAD

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            minimax-image-*.zip
            minimax-image-*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
